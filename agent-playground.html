<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swift Order AI - Playground (Live DB)</title>
    <!-- Tailwind CSS for quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #FAFAFB;
        }

        .chat-container {
            height: calc(100vh - 180px);
        }

        .message-content p {
            margin-bottom: 0.5rem;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .message-content strong {
            font-weight: 600;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans text-gray-900 h-screen flex flex-col">

    <!-- Header -->
    <header
        class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shrink-0 shadow-sm gap-4">
        <div class="flex items-center gap-3">
            <div
                class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center text-white font-bold shrink-0">
                ⚡️
            </div>
            <div>
                <h1 class="text-lg font-bold truncate">Swift Order AI Playground</h1>
                <p class="text-xs text-gray-500 whitespace-nowrap">Testing Live Supabase Data Integration</p>
            </div>
        </div>

        <div class="flex items-center gap-3 flex-1 max-w-2xl">
            <div class="flex-1 flex items-center gap-2">
                <label class="text-xs font-semibold text-gray-600 whitespace-nowrap">API Key:</label>
                <input id="apiKeyInput" type="password" value="AIzaSyC5E4kT-9Ly5C9ScqBl5skDiqr84tTLIxM"
                    class="bg-gray-100 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-orange-500 focus:border-orange-500 block w-full p-2 outline-none font-mono"
                    placeholder="Paste Gemini Key here...">
            </div>
            <div class="flex-1 flex items-center gap-2">
                <label class="text-xs font-semibold text-gray-600 whitespace-nowrap">Client ID:</label>
                <input id="clientIdInput" type="text" value="55d37a4e-9684-4daa-9f3c-26526e9837ae"
                    class="bg-gray-100 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-orange-500 focus:border-orange-500 block w-full p-2 outline-none font-mono"
                    placeholder="Paste Client UUID here...">
            </div>
            <div class="flex-1 flex items-center gap-2">
                <label class="text-xs font-semibold text-gray-600 whitespace-nowrap">Model:</label>
                <select id="modelSelect"
                    class="bg-gray-100 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-orange-500 focus:border-orange-500 block w-full p-2 outline-none font-sans cursor-pointer">
                    <option value="gemini-3-flash-preview">Gemini 3.0 Flash Preview</option>
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash (More Stable)</option>
                </select>
            </div>
            <button id="resetBtn"
                class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors whitespace-nowrap shrink-0">
                Refresh Agent
            </button>
            <button id="clearHistoryBtn"
                class="px-4 py-2 text-sm font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition-colors whitespace-nowrap shrink-0">
                Clear History
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 flex flex-col">

        <!-- Chat Area -->
        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm flex-1 flex flex-col overflow-hidden">

            <!-- Messages Container -->
            <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6">
                <!-- Initial System Message -->
                <div class="flex flex-col items-center justify-center h-full text-center text-gray-400" id="emptyState">
                    <p class="mb-2">Say hi to start the conversation with the KFC agent.</p>
                    <p class="text-sm">If you see a "429 Too Many Requests" error, please wait 60 seconds or use your
                        own Gemini API Key in the field above.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="border-t border-gray-100 p-4 bg-gray-50">
                <form id="chatForm" class="flex gap-3">
                    <input type="text" id="messageInput"
                        class="flex-1 px-4 py-3 rounded-xl border border-gray-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 outline-none transition-all"
                        placeholder="Type a message as the customer..." autocomplete="off" required>
                    <button type="submit" id="sendBtn"
                        class="px-6 py-3 bg-gray-900 hover:bg-black text-white font-medium rounded-xl transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 shrink-0">
                        Send
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // Configuration
        const SUPABASE_URL = "https://chwxcfzqjxyorewehcwa.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNod3hjZnpxanh5b3Jld2VoY3dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2MzcwNDYsImV4cCI6MjA4NjIxMzA0Nn0.K9bIUr-13_F7FvR6qDnwK2pvo_Tlae43opvMq2OyNbg";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let genAI = null;
        const PAYSTACK_SECRET = "sk_test_75f6a70b6f18d0692bd85e194e7826ae449f6de1"; // Injected for playground use

        // Tool execution function: FETCH FROM SUPABASE
        async function fetchBusinessData(clientId) {
            console.log("TOOL EXECUTED: fetchBusinessData for", clientId);

            try {
                // 1. Fetch Client info
                const { data: client, error: clientErr } = await supabase
                    .from('clients')
                    .select('business_name, payment_model, delivery_instructions')
                    .eq('id', clientId)
                    .single();

                if (clientErr) throw clientErr;

                // 2. Fetch Menu Items
                const { data: menu, error: menuErr } = await supabase
                    .from('menu_items')
                    .select('name, price, description, category, is_available')
                    .eq('client_id', clientId)
                    .eq('is_available', true);

                if (menuErr) throw menuErr;

                // 3. Fetch Delivery Fees
                const { data: zones, error: zonesErr } = await supabase
                    .from('delivery_fees')
                    .select('location, fee')
                    .eq('client_id', clientId);

                if (zonesErr) throw zonesErr;

                return {
                    businessName: client.business_name,
                    menu: menu.map(m => ({ item: m.name, price: m.price, description: m.description, category: m.category })),
                    deliveryZones: zones.map(z => ({ zone: z.location, fee: z.fee })),
                    paymentInfo: "Payment Link will be generated upon confirmation."
                };
            } catch (err) {
                console.error("Supabase Fetch Error:", err);
                return { error: `Database fetch failed: ${err.message}` };
            }
        }

        // Tool execution function: GENERATE PAYSTACK LINK
        async function generatePaymentLink(clientId, amount, email) {
            console.log("TOOL EXECUTED: generatePaymentLink", { clientId, amount, email });
            try {
                // 1. Get client's subaccount
                const { data: client, error: clientErr } = await supabase
                    .from('clients')
                    .select('paystack_subaccount_code, business_name')
                    .eq('id', clientId)
                    .single();

                if (clientErr) throw clientErr;

                const response = await fetch('https://api.paystack.co/transaction/initialize', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${PAYSTACK_SECRET}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email || "customer@example.com",
                        amount: Math.round(amount * 100),
                        subaccount: client.paystack_subaccount_code,
                        metadata: { client_id: clientId, business_name: client.business_name }
                    })
                });

                const data = await response.json();
                if (!data.status) throw new Error(data.message);

                return {
                    paymentUrl: data.data.authorization_url,
                    reference: data.data.reference,
                    instruction: "Send this URL to the customer. Once they pay, the webhook will create the order row. Then you can use update_order_items."
                };
            } catch (err) {
                console.error("Paystack Error:", err);
                return { error: err.message };
            }
        }

        // Tool execution function: UPDATE ORDER ITEMS
        async function updateOrderItems(clientId, email, itemsSummary) {
            console.log("TOOL EXECUTED: updateOrderItems", { clientId, email, itemsSummary });
            try {
                // Find the latest order for this email that is paid but has placeholder items
                const { data: orders, error: fetchErr } = await supabase
                    .from('orders')
                    .select('id, order_id, items_summary')
                    .eq('client_id', clientId)
                    .eq('customer_email', email)
                    .eq('payment_status', 'Paid')
                    // We check for null order_id to find the "pending" one
                    .is('order_id', null)
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (fetchErr) throw fetchErr;
                if (!orders || orders.length === 0) {
                    return { error: "No pending paid order found for this customer. Please confirm they have completed the payment." };
                }

                const order = orders[0];
                const generatedOrderId = `ORD-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;

                const { error: updateErr } = await supabase
                    .from('orders')
                    .update({
                        items_summary: itemsSummary,
                        order_id: generatedOrderId
                    })
                    .eq('id', order.id);

                if (updateErr) throw updateErr;

                return {
                    status: "Success",
                    orderId: generatedOrderId,
                    message: "Order items and ID updated successfully. You can now confirm the order details and the new Order ID to the customer."
                };
            } catch (err) {
                console.error("Update Order Error:", err);
                return { error: err.message };
            }
        }

        // Define the tool schema for Gemini
        const getBusinessInfoTool = {
            name: "get_business_info",
            description: "Fetches live business information including the menu and delivery fees from the database for a given client_id.",
            parameters: {
                type: "OBJECT",
                properties: {
                    client_id: {
                        type: "STRING",
                        description: "The unique UUID of the client.",
                    }
                },
                required: ["client_id"],
            },
        };

        const generatePaymentLinkTool = {
            name: "generate_payment_link",
            description: "Generates a Paystack payment link for the customer. Call this after the user confirms their order details.",
            parameters: {
                type: "OBJECT",
                properties: {
                    client_id: { type: "STRING", description: "The UUID of the client." },
                    amount: { type: "NUMBER", description: "The total amount in NGN to charge." },
                    customer_email: { type: "STRING", description: "The customer's email address collected earlier." }
                },
                required: ["client_id", "amount", "customer_email"],
            },
        };

        const updateOrderItemsTool = {
            name: "update_order_items",
            description: "Updates the finalized order in the database with the actual items ordered and generates a human-readable Order ID. Call this AFTER the user confirms they have paid.",
            parameters: {
                type: "OBJECT",
                properties: {
                    client_id: { type: "STRING", description: "The UUID of the client." },
                    customer_email: { type: "STRING", description: "The customer's email address." },
                    items_summary: { type: "STRING", description: "A detailed summary of the items ordered (e.g. '2x KFC Bucket, 1x Coke'). Include Name and Phone if available." }
                },
                required: ["client_id", "customer_email", "items_summary"],
            },
        };

        const tools = [{
            functionDeclarations: [getBusinessInfoTool, generatePaymentLinkTool, updateOrderItemsTool],
        }];

        // State
        const modelSelect = document.getElementById('modelSelect');
        const STORAGE_KEY = 'swift_order_chat_history';
        let chatSession = null;
        let isProcessing = false;

        // DOM Elements
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const chatBox = document.getElementById('chatBox');
        const emptyState = document.getElementById('emptyState');
        const sendBtn = document.getElementById('sendBtn');
        const resetBtn = document.getElementById('resetBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const clientIdInput = document.getElementById('clientIdInput');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // History Persistence
        function saveHistory(history) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function getStoredHistory() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : null;
        }

        // Initialize Chat
        async function initChat() {
            chatBox.innerHTML = '';
            emptyState.style.display = 'flex';
            chatBox.appendChild(emptyState);

            const apiKey = apiKeyInput.value.trim();
            const activeClientId = clientIdInput.value.trim();

            if (!apiKey) {
                appendSystemMessage("Please enter a Gemini API Key to start.");
                return;
            }

            if (!activeClientId) {
                appendSystemMessage("Please enter a valid Client UUID to start.");
                return;
            }

            const selectedModel = modelSelect.value;
            console.log(`Initializing chat with Supabase for ${activeClientId} using ${selectedModel}...`);

            try {
                genAI = new GoogleGenerativeAI(apiKey);

                const systemInstruction = `
You are a highly efficient, friendly, and professional virtual sales assistant for a premium food business.
CRITICAL: Dynamic Business Context via Tools
You are assigned to work for the client with ID: "${activeClientId}".
You MUST use the get_business_info tool on EVERY turn to ensure real-time accuracy.
Follow all rules in the agent-prompt.md file provided to you.
            `;

                const model = genAI.getGenerativeModel({
                    model: selectedModel,
                    systemInstruction: systemInstruction,
                    tools: tools,
                    generationConfig: {
                        temperature: selectedModel.includes("gemini-3") ? 1.0 : 0.1,
                        topP: 0.95,
                        topK: 40,
                    }
                });

                const storedHistory = getStoredHistory();
                if (storedHistory && storedHistory.length > 0) {
                    // Populate UI from history
                    storedHistory.forEach(turn => {
                        const isUserTurn = turn.role === 'user';
                        const text = turn.parts[0].text;
                        if (text) appendMessage(text, isUserTurn);
                    });
                    chatSession = model.startChat({ history: storedHistory });
                    appendSystemMessage(`Resumed conversation using ${selectedModel}.`);
                } else {
                    chatSession = model.startChat({ history: [] });
                    appendSystemMessage(`Agent ready. Using ${selectedModel}.`);
                }
            } catch (err) {
                console.error("Init error:", err);
                appendSystemMessage("Error initializing Gemini. Check your API key.");
            }
        }

        // UI Helpers
        function appendMessage(text, isUser = false) {
            if (emptyState && emptyState.parentNode === chatBox) {
                chatBox.removeChild(emptyState);
            }
            const div = document.createElement('div');
            div.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'}`;
            const bubbleClasses = isUser ? 'bg-gray-900 text-white rounded-2xl rounded-tr-sm' : 'bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-tl-sm shadow-sm';

            // Render markdown for agent, plain text for user
            const content = isUser ? text : marked.parse(text);
            div.innerHTML = `<div class="max-w-[80%] px-5 py-3 ${bubbleClasses} message-content text-[15px] leading-relaxed">${isUser ? `<p>${text}</p>` : content}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendSystemMessage(text) {
            const div = document.createElement('div');
            div.className = `flex w-full justify-center my-2`;
            div.innerHTML = `<div class="px-4 py-1.5 bg-gray-100 text-gray-500 rounded-full text-xs font-medium font-mono">🤖 ${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendToolLog(name, args, result) {
            const div = document.createElement('div');
            div.className = `flex w-full justify-start my-2`;
            const logContent = `**Tool:** \`${name}\`\n**Args:** \`${JSON.stringify(args)}\`\n**Result:** \`${JSON.stringify(result).substring(0, 100)}...\``;
            div.innerHTML = `<div class="px-4 py-3 bg-orange-50 border border-orange-100 text-orange-800 rounded-xl text-[13px] font-mono w-full max-w-[90%] overflow-hidden">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 bg-orange-400 rounded-full animate-pulse"></span>
                    <span class="font-bold">TOOL_CALL: ${name}</span>
                </div>
                <div class="opacity-80">${logContent}</div>
            </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendTypingIndicator() {
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = `flex w-full justify-start`;
            div.innerHTML = `<div class="px-5 py-4 bg-white border border-gray-200 rounded-2xl rounded-tl-sm shadow-sm flex gap-1 items-center"><div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div><div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div><div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div></div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Form Submit
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (isProcessing || !chatSession) return;
            const msg = messageInput.value.trim();
            if (!msg) return;

            messageInput.value = '';
            appendMessage(msg, true);
            isProcessing = true;
            sendBtn.disabled = true;
            appendTypingIndicator();

            try {
                let response = await chatSession.sendMessage(msg);

                // Infinite loop protection: Limit tool turns to 5
                let turns = 0;
                while (response.response.functionCalls()?.length > 0 && turns < 5) {
                    turns++;
                    const functionCalls = response.response.functionCalls();
                    const functionResponses = [];

                    for (const call of functionCalls) {
                        let result;
                        if (call.name === "get_business_info") {
                            console.log("Executing tool:", call.name, call.args);
                            result = await fetchBusinessData(call.args.client_id);
                        } else if (call.name === "generate_payment_link") {
                            console.log("Executing tool:", call.name, call.args);
                            result = await generatePaymentLink(call.args.client_id, call.args.amount, call.args.customer_email);
                        } else if (call.name === "update_order_items") {
                            console.log("Executing tool:", call.name, call.args);
                            result = await updateOrderItems(call.args.client_id, call.args.customer_email, call.args.items_summary);
                        }

                        if (result) {
                            appendToolLog(call.name, call.args, result);
                            functionResponses.push({
                                functionResponse: {
                                    name: call.name,
                                    response: result
                                }
                            });
                        }
                    }

                    if (functionResponses.length > 0) {
                        response = await chatSession.sendMessage(functionResponses);
                    } else {
                        break;
                    }
                }

                removeTypingIndicator();

                // Final Check: finishReason
                const candidate = response.response.candidates?.[0];
                if (candidate?.finishReason === 'SAFETY') {
                    appendMessage("⚠️ *Note: The response was partially filtered due to safety policies.*", false);
                }

                appendMessage(response.response.text(), false);
                
                // Persist History
                saveHistory(await chatSession.getHistory());

            } catch (error) {
                console.error("Full Error Context:", error);
                removeTypingIndicator();

                if (error.message?.includes("429") || error.message?.includes("Resource exhausted")) {
                    appendMessage("⚠️ **Rate Limit Reached (429)**. Gemini free tier is limited. Please wait 60 seconds or use a different API key in the header above.", false);
                } else if (error.message?.includes("API_KEY_INVALID")) {
                    appendMessage("❌ **Invalid API Key**. Please check the key in the header.", false);
                } else {
                    appendMessage("❌ **Error:** " + error.message, false);
                }
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
            }
        });

        resetBtn.addEventListener('click', () => initChat());
        clearHistoryBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to clear the entire chat history?")) {
                localStorage.removeItem(STORAGE_KEY);
                initChat();
            }
        });
        initChat();
    </script>
</body>

</html>
